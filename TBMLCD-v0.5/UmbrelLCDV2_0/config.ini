# ============================================================
#  TBM (The Bitcoin Machine) - LCD 설정 파일
#  파일 위치: ~/TBM/TBMLCD-v0.5/UmbrelLCDV2_0/config.ini
# ============================================================
#
# 이 파일을 수정하면 코드를 건드리지 않고 설정을 바꿀 수 있습니다.
# 수정 후 서비스를 재시작하면 적용됩니다:
#   sudo systemctl restart UmbrelST7735LCD
#
# ============================================================

[DISPLAY]
# 각 화면이 표시되는 시간 (초 단위)
# 기본값: 로고=60초, 가격화면=60초, 나머지=30초

# 시작 시 Umbrel 로고 표시 시간 (초)
logo_duration = 60

# 비트코인 가격 화면 (Screen 1) 표시 시간 (초)
screen1_duration = 60

# 나머지 모든 화면 (Screen 2~7) 표시 시간 (초)
# 이 값을 바꾸면 블록 높이, 날짜/시간, 네트워크 정보,
# 라이트닝 채널, 디스크 화면이 모두 같은 시간으로 바뀝니다.
screen_duration = 30


[BITCOIN]
# Bitcoin RPC 연결 설정
# Umbrel이 업데이트되어 RPC 비밀번호가 바뀌면 여기만 수정하세요.
# 기본값은 Umbrel의 표준 설정입니다.

# rpc_user = umbrel
# rpc_pass = moneyprintergobrrr
# rpc_host = 127.0.0.1
# rpc_port = 8332

# Bitcoin 컨테이너 이름 (Umbrel 버전에 따라 다를 수 있음)
# 자동으로 여러 이름을 시도하므로 보통 수정 불필요
# container = bitcoin_bitcoind_1


[LIGHTNING]
# LND 컨테이너 이름 (Umbrel 버전에 따라 다를 수 있음)
# 자동으로 여러 이름을 시도하므로 보통 수정 불필요
# container = lightning_lnd_1
